services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfoliodb}
      POSTGRES_USER: ${POSTGRES_USER:-portfoliouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfoliouser} -d ${POSTGRES_DB:-portfoliodb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/Portfolio.API
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-portfoliodb};Username=${POSTGRES_USER:-portfoliouser};Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-portfolio-api}
      Jwt__Audience: ${JWT_AUDIENCE:-portfolio-client}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Pass: ${SMTP_PASS:-}
      Smtp__ContactReceiver: ${CONTACT_RECEIVER:-}
      Admin__Email: ${ADMIN_EMAIL}
      Admin__Password: ${ADMIN_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      API_HOST: api:8080
      NGINX_ENVSUBST_TEMPLATE_VARS: API_HOST
    depends_on:
      - api

volumes:
  postgres_data:
